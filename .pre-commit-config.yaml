# Check-only pre-commit hooks (the non-modifying gate). Auto-fixers live in
# .pre-commit-config-fix.yaml — run that once as a prep step, then this to
# confirm clean (the fix-then-check discipline in the global rules/pre-commit.md).
# Terraform validate/test run in CI (they need the provider dev-override); here
# we run fmt-check and the cross-cutting safety hooks.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: no-commit-to-branch
        args: [--branch, master]
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-yaml
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.5
    hooks:
      - id: terraform_fmt

  - repo: local
    hooks:
      # trivy config — terraform misconfiguration scan (Docker image, so no
      # local install and no dev-override needed; it is a static scan). Scoped
      # to the terraform scanner.
      - id: trivy-config-terraform
        name: trivy config — terraform misconfig (docker)
        language: docker_image
        entry: aquasec/trivy:0.71.2 config --quiet --misconfig-scanners terraform .
        files: \.tf$
        pass_filenames: false
      # tflint catches what terraform validate can't (deprecated syntax,
      # undocumented/untyped variables, unpinned sources). Docker image,
      # recursive over modules/, reading .tflint.hcl (bundled terraform ruleset,
      # recommended preset). No --init / no --deep — credential-free.
      - id: tflint
        name: tflint --recursive (docker)
        language: docker_image
        entry: ghcr.io/terraform-linters/tflint:v0.63.1 --recursive --no-color
        files: \.tf$
        pass_filenames: false
      # Module READMEs are terraform-docs-generated (bin/build-docs). This gate
      # fails if any is stale vs its .tf — non-modifying (terraform-docs
      # --output-check via bin/build-docs --check). Regenerate: bin/build-docs.
      # Also triggers on .terraform-docs.yml (its template drives the output).
      - id: terraform-docs-check
        name: terraform-docs READMEs up to date
        language: script
        entry: bin/build-docs --check
        files: (\.tf|\.terraform-docs\.yml)$
        pass_filenames: false

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint-docker
