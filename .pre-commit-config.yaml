# Check-only pre-commit hooks (the non-modifying gate). Auto-fixers live in
# .pre-commit-config-fix.yaml — run that once as a prep step, then this to
# confirm clean (the fix-then-check discipline in the global rules/pre-commit.md).
# Terraform validate/test run in CI (they need the provider dev-override); here
# we run fmt-check and the cross-cutting safety hooks.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: no-commit-to-branch
        args: [--branch, master]
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-yaml
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.5
    hooks:
      - id: terraform_fmt

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint-docker
