name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

env:
  TERRAFORM_VERSION: "1.14.0"
  TERRAFORM_DOCS_VERSION: "0.20.0"

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install terraform-docs
        run: |
          set -euo pipefail
          ver="${TERRAFORM_DOCS_VERSION}"
          curl -fsSL "https://terraform-docs.io/dl/v${ver}/terraform-docs-v${ver}-linux-amd64.tar.gz" -o /tmp/tfdocs.tgz
          tar -xzf /tmp/tfdocs.tgz -C /tmp terraform-docs
          sudo install /tmp/terraform-docs /usr/local/bin/terraform-docs
          terraform-docs --version
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit (check config)
        env:
          # no-commit-to-branch is a local edit-time guard; in CI the commit
          # already exists, and on a push to master it would always fail.
          SKIP: no-commit-to-branch
        # Run pre-commit directly rather than via pre-commit/action@v3.0.1 —
        # that action bundles actions/cache@v4, whose Node 20 runtime triggers
        # a deprecation warning. The hook environments are cheap to rebuild.
        run: pre-commit run --all-files --show-diff-on-failure

  terraform:
    name: terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: fmt check
        run: terraform fmt -check -recursive modules/

      - name: init + validate + test each module
        run: |
          set -euo pipefail
          for m in modules/*/; do
            echo "::group::$m"
            terraform -chdir="$m" init -input=false
            terraform -chdir="$m" validate
            terraform -chdir="$m" test
            echo "::endgroup::"
          done
