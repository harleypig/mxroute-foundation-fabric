name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

env:
  # The provider is not yet on the Registry; CI consumes its published GitHub
  # release binary via a dev-override. Bump when the provider releases.
  PROVIDER_VERSION: "0.1.0"
  TERRAFORM_VERSION: "1.14.0"
  TERRAFORM_DOCS_VERSION: "0.20.0"

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install terraform-docs
        run: |
          set -euo pipefail
          ver="${TERRAFORM_DOCS_VERSION}"
          curl -fsSL "https://terraform-docs.io/dl/v${ver}/terraform-docs-v${ver}-linux-amd64.tar.gz" -o /tmp/tfdocs.tgz
          tar -xzf /tmp/tfdocs.tgz -C /tmp terraform-docs
          sudo install /tmp/terraform-docs /usr/local/bin/terraform-docs
          terraform-docs --version
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit (check config)
        env:
          # no-commit-to-branch is a local edit-time guard; in CI the commit
          # already exists, and on a push to master it would always fail.
          SKIP: no-commit-to-branch
        # Run pre-commit directly rather than via pre-commit/action@v3.0.1 —
        # that action bundles actions/cache@v4, whose Node 20 runtime triggers
        # a deprecation warning. The hook environments are cheap to rebuild.
        run: pre-commit run --all-files --show-diff-on-failure

  terraform:
    name: terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Fetch the provider release binary into a dev-override
        run: |
          set -euo pipefail
          mkdir -p .dev
          url="https://github.com/harleypig/terraform-provider-mxroute/releases/download/v${PROVIDER_VERSION}/terraform-provider-mxroute_${PROVIDER_VERSION}_linux_amd64.zip"
          curl -fsSL "$url" -o /tmp/provider.zip
          unzip -o /tmp/provider.zip -d /tmp/provider
          # dev_overrides looks for an executable named terraform-provider-mxroute
          # in the target directory.
          install -m 0755 /tmp/provider/terraform-provider-mxroute_v${PROVIDER_VERSION} .dev/terraform-provider-mxroute
          cat > ci.tfrc <<EOF
          provider_installation {
            dev_overrides {
              "harleypig/mxroute" = "$PWD/.dev"
            }
            direct {}
          }
          EOF

      - name: fmt check
        run: terraform fmt -check -recursive modules/

      - name: validate + test each module
        env:
          TF_CLI_CONFIG_FILE: ${{ github.workspace }}/ci.tfrc
        run: |
          set -euo pipefail
          for m in modules/*/; do
            echo "::group::$m"
            terraform -chdir="$m" validate
            terraform -chdir="$m" test
            echo "::endgroup::"
          done
