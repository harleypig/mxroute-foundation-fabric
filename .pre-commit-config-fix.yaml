# Auto-fixing pre-commit hooks (modifying). Run ONCE as a prep step before
# committing:
#   pre-commit run --all-files --config .pre-commit-config-fix.yaml
# then run the check config. Never mid-session, per the global rules/pre-commit.md.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.5
    hooks:
      - id: terraform_fmt

  - repo: local
    hooks:
      # Regenerate each module's terraform-docs README via bin/build-docs, which
      # explicitly passes -c .terraform-docs.yml (unlike the stock terraform_docs
      # hook, which ignores it) so the generated block keeps its markdownlint
      # capture/disable/restore wrapper. Mirrors terraform-docs-check in the
      # check config — one code path, so fix and check can't drift apart.
      - id: terraform-docs
        name: terraform-docs READMEs (regenerate)
        language: script
        entry: bin/build-docs
        files: (\.tf|\.terraform-docs\.yml)$
        pass_filenames: false

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint-fix-docker
