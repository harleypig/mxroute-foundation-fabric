# Auto-fixing pre-commit hooks (modifying). Run ONCE as a prep step before
# committing:
#   pre-commit run --all-files --config .pre-commit-config-fix.yaml
# then run the check config. Never mid-session, per the global rules/pre-commit.md.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.5
    hooks:
      - id: terraform_fmt
      # terraform_docs regenerates each module's README tables in place (config:
      # .terraform-docs.yml, injected between the BEGIN_TF_DOCS/END_TF_DOCS
      # markers).
      - id: terraform_docs
        args: [--hook-config=--path-to-file=README.md]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint-fix-docker
